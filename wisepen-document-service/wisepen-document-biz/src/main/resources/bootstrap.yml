server:
  port: 9500
  tomcat:
    connection-timeout: 60000
    accept-count: 100

spring:
  application:
    name: wisepen-document-service
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      discovery:
        server-addr: wisepen-dev-server:8848
        username: ${NACOS_USERNAME}
        password: ${NACOS_PASSWORD}
      config:
        server-addr: wisepen-dev-server:8848
        username: ${NACOS_USERNAME}
        password: ${NACOS_PASSWORD}
        file-extension: yaml
        group: DEFAULT_GROUP
        shared-configs:
          - data-id: wisepen-common-${spring.profiles.active}.yaml
            group: DEFAULT_GROUP
            refresh: true
    inetutils:
      ignored-interfaces: [VMnet.*, vEthernet.*, docker0]
      preferred-networks: [10]
  profiles:
    active: dev
  
jodconverter:
  local:
    enabled: false
  remote:
    enabled: true
    url: http://wisepen-dev-server:8100/


logging:
  level:
    root: INFO
    org.jodconverter: DEBUG
    com.oriole.wisepen.file: INFO