server:
  port: 9700

spring:
  application:
    name: wisepen-note-service
  cloud:
    nacos:
      discovery:
        server-addr: wisepen-dev-server:8848
        username: ${NACOS_USERNAME}
        password: ${NACOS_PASSWORD}
      config:
        server-addr: wisepen-dev-server:8848
        username: ${NACOS_USERNAME}
        password: ${NACOS_PASSWORD}
        file-extension: yaml
        group: DEFAULT_GROUP
        shared-configs:
          - data-id: wisepen-common-${spring.profiles.active}.yaml
            group: DEFAULT_GROUP
            refresh: true
    inetutils:
      ignored-interfaces:
        - VMnet.*
        - vEthernet.*
        - docker0
      preferred-networks:
        - 10
  profiles:
    active: dev
